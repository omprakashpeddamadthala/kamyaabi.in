name: CI - Docker Build and Push

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  backend-test:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: kamyaabi-backend
        run: mvn clean verify -B

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: kamyaabi-backend/target/site/jacoco/

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: kamyaabi-frontend/package-lock.json

      - name: Install dependencies
        working-directory: kamyaabi-frontend
        run: npm ci

      - name: Build
        working-directory: kamyaabi-frontend
        run: npm run build

  docker-build-push-backend:
    name: Docker - Backend Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate unique date-based tag
        id: datestamp
        run: |
          BASE_DATE=$(date +'%m%d%Y')
          IMAGE="omprakashornold/kamyaabi-backend"

          # Check if the base date tag already exists on Docker Hub
          TAG="${BASE_DATE}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")

          if [ "$STATUS" = "200" ]; then
            # Tag exists — find the next available suffix (-1, -2, ...)
            COUNTER=1
            while true; do
              TAG="${BASE_DATE}-${COUNTER}"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")
              if [ "$STATUS" != "200" ]; then
                break
              fi
              COUNTER=$((COUNTER + 1))
            done
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./kamyaabi-backend
          file: ./kamyaabi-backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            omprakashornold/kamyaabi-backend:latest
            omprakashornold/kamyaabi-backend:${{ github.sha }}
            omprakashornold/kamyaabi-backend:${{ steps.datestamp.outputs.tag }}

  docker-build-push-frontend:
    name: Docker - Frontend Build & Push
    runs-on: ubuntu-latest
    needs: [frontend-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate unique date-based tag
        id: datestamp
        run: |
          BASE_DATE=$(date +'%m%d%Y')
          IMAGE="omprakashornold/kamyaabi-frontend"

          # Check if the base date tag already exists on Docker Hub
          TAG="${BASE_DATE}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")

          if [ "$STATUS" = "200" ]; then
            # Tag exists — find the next available suffix (-1, -2, ...)
            COUNTER=1
            while true; do
              TAG="${BASE_DATE}-${COUNTER}"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")
              if [ "$STATUS" != "200" ]; then
                break
              fi
              COUNTER=$((COUNTER + 1))
            done
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./kamyaabi-frontend
          file: ./kamyaabi-frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            omprakashornold/kamyaabi-frontend:latest
            omprakashornold/kamyaabi-frontend:${{ github.sha }}
            omprakashornold/kamyaabi-frontend:${{ steps.datestamp.outputs.tag }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
