server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024
  servlet:
    # Multipart limits apply to product image uploads — kept slightly higher than
    # the per-file 5 MB enforced in CloudinaryServiceImpl to allow 5 files at once.
    multipart:
      max-file-size: 5MB
      max-request-size: 30MB

spring:
  application:
    name: kamyaabi-backend

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# NOTE: appenders, rolling policy, and log format live in src/main/resources/logback-spring.xml
# so profile-aware rolling files and correlationId MDC rendering can be configured properly.
# Root/framework log levels are still tunable here and can be changed at runtime via the
# /actuator/loggers endpoint.
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN

# -----------------------------------------------------------------------------
# Spring Boot Actuator
# -----------------------------------------------------------------------------
# Endpoints used in production are exposed here; access is gated in SecurityConfig
# (ROLE_ADMIN for sensitive endpoints, anonymous only for /health and /info).
# Use /actuator/loggers at runtime to adjust log levels without a redeploy —
# see docs/LOGGING.md for the curl recipe.
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,loggers,env
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    loggers:
      enabled: true
  info:
    env:
      enabled: true
    git:
      enabled: true
    build:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: @project.version@
    description: "Kamyaabi — Premium Dry Fruits eCommerce Backend API"
