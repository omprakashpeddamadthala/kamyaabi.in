server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024
  # No size limit on uploads — images are validated at the service layer (content
  # type only). Spring's multipart parser AND embedded Tomcat's form / swallow
  # caps must all be disabled so the product image upload endpoint accepts files
  # of any size. Operators must size the upstream proxy (e.g. Nginx
  # client_max_body_size) accordingly.
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  tomcat:
    # Disable Tomcat's application/x-www-form-urlencoded size cap (default 2MB).
    # Not strictly needed for multipart, but kept at -1 so no Tomcat-level form
    # limit can surface a MaxUploadSizeExceededException for any body type.
    max-http-form-post-size: -1
    # Disable Tomcat's swallow limit so oversize rejected bodies (if any) are
    # drained without aborting the connection. -1 = unlimited.
    max-swallow-size: -1

spring:
  application:
    name: kamyaabi-backend

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# NOTE: appenders, rolling policy, and log format live in src/main/resources/logback-spring.xml
# so profile-aware rolling files and correlationId MDC rendering can be configured properly.
# Root/framework log levels are still tunable here and can be changed at runtime via the
# /actuator/loggers endpoint.
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN

# -----------------------------------------------------------------------------
# Spring Boot Actuator
# -----------------------------------------------------------------------------
# Endpoints used in production are exposed here; access is gated in SecurityConfig
# (ROLE_ADMIN for sensitive endpoints, anonymous only for /health and /info).
# Use /actuator/loggers at runtime to adjust log levels without a redeploy —
# see docs/LOGGING.md for the curl recipe.
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,loggers,env
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    loggers:
      enabled: true
  info:
    env:
      enabled: true
    git:
      enabled: true
    build:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: @project.version@
    description: "Kamyaabi — Premium Dry Fruits eCommerce Backend API"
