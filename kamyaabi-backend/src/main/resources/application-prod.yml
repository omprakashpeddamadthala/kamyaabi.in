server:
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 7200000  # 2 hours

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://kamyaabi.shop}

  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}

  support:
    email: ${APP_SUPPORT_EMAIL:support@kamyaabi.shop}
    url: ${APP_SUPPORT_URL:https://kamyaabi.shop}

  email:
    enabled: ${EMAIL_ENABLED:true}
    from-email: ${EMAIL_FROM:noreply@kamyaabi.shop}
    from-name: ${EMAIL_FROM_NAME:Kamyaabi}
    admin-emails:
      - ${ADMIN_EMAIL:admin@kamyaabi.shop}
    sendgrid:
      api-key: ${SENDGRID_API_KEY}
    smtp:
      host: ${SMTP_HOST:}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
      starttls-enabled: true
      auth: true
