spring:
  datasource:
    url: jdbc:h2:mem:kamyaabidb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:true}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: openid,profile,email

app:
  jwt:
    secret: ${JWT_SECRET:kamyaabi-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000

  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}

  email:
    enabled: true
    from-email: ${EMAIL_FROM:noreply@nextnotepad.com}
    from-name: Kamyaabi
    admin-emails:
      - ${ADMIN_EMAIL:admin@nextnotepad.com}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:your-sendgrid-api-key}
    smtp:
      host: ${SMTP_HOST:smtp.gmail.com-placeholder}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
      starttls-enabled: true
      auth: true
