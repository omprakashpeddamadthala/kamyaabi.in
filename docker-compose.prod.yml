# Production Docker Compose — frontend + backend only
# SSL termination is handled by Nginx installed on the host VM (not in Docker).
# See DEPLOYMENT.md and nginx/vm/kamyaabi.conf for the VM-level Nginx setup.

services:
  backend:
    image: omprakashornold/kamyaabi-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: kamyaabi-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-kamyaabi-docker-secret-key-must-be-at-least-256-bits-long-for-hs256}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://kamyaabi.in}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholder_secret}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@kamyaabi.in}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Kamyaabi}
      # ADMIN_EMAIL removed — admin recipients are resolved from the users table.
      DEVELOPER_EMAILS: ${DEVELOPER_EMAILS:-}
      APP_SUPPORT_EMAIL: ${APP_SUPPORT_EMAIL:-support@kamyaabi.in}
      APP_SUPPORT_URL: ${APP_SUPPORT_URL:-https://kamyaabi.in}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-your-sendgrid-api-key}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME is required}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY is required}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET is required}
      PRODUCT_IMAGE_MAX_COUNT: ${PRODUCT_IMAGE_MAX_COUNT:-5}
      # Shiprocket — either SHIPROCKET_API_TOKEN (static, ~10 day expiry) or
      # SHIPROCKET_EMAIL + SHIPROCKET_PASSWORD (auto-refresh) must be set for
      # the admin Shiprocket dashboard and COD order sync to work.
      SHIPROCKET_API_TOKEN: ${SHIPROCKET_API_TOKEN:-}
      SHIPROCKET_EMAIL: ${SHIPROCKET_EMAIL:-}
      SHIPROCKET_PASSWORD: ${SHIPROCKET_PASSWORD:-}
      SHIPROCKET_TOKEN_REFRESH_INTERVAL_SECONDS: ${SHIPROCKET_TOKEN_REFRESH_INTERVAL_SECONDS:-777600}
      SHIPROCKET_PICKUP_LOCATION: ${SHIPROCKET_PICKUP_LOCATION:-Primary Warehouse}
      SHIPROCKET_CHANNEL_ID: ${SHIPROCKET_CHANNEL_ID:-}
      SHIPROCKET_WEBHOOK_SECRET: ${SHIPROCKET_WEBHOOK_SECRET:-}
      SHIPROCKET_DEFAULT_WEIGHT: ${SHIPROCKET_DEFAULT_WEIGHT:-0.5}
      SHIPROCKET_DEFAULT_LENGTH: ${SHIPROCKET_DEFAULT_LENGTH:-10}
      SHIPROCKET_DEFAULT_BREADTH: ${SHIPROCKET_DEFAULT_BREADTH:-10}
      SHIPROCKET_DEFAULT_HEIGHT: ${SHIPROCKET_DEFAULT_HEIGHT:-10}
      # Override of the relative `logs` path used in logback-spring.xml. With
      # WORKDIR=/app the default would already resolve to /app/logs, but we set
      # it explicitly so the bind-mount target below is unambiguous.
      LOG_HOME: /app/logs
    volumes:
      # Bind-mount the container's log directory to ./logs on the host so
      # operators can `tail -f logs/application.log` without `docker exec`.
      # Logback handles daily rotation + 10-day retention inside this directory.
      - ./logs:/app/logs
    networks:
      - kamyaabi-network

  frontend:
    image: omprakashornold/kamyaabi-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: kamyaabi-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - kamyaabi-network

networks:
  kamyaabi-network:
    driver: bridge
