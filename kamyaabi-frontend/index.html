<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Microsoft Clarity analytics -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "x6t8zg7rj0");
    </script>

    <!-- Kamyaabi brand favicon (generated from the brand logo). -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1D4ED8" />
    <title>Kamyaabi - Premium Dry Fruits</title>

    <!-- GSC FIX: static SEO defaults in the SPA shell. Per-page <Seo> tags
         (react-helmet-async) override these once React mounts, but non-JS
         crawlers / social scrapers (Facebook, WhatsApp, Twitter, LinkedIn)
         that never run JS still get a valid title, description and preview. -->
    <meta
      name="description"
      content="Shop premium, hand-picked dry fruits and nuts at Kamyaabi — almonds, cashews, pistachios and more. Sourced for purity, sealed for freshness, delivered across India."
    />
    <link rel="canonical" href="https://kamyaabi.in/" />
    <meta property="og:site_name" content="Kamyaabi" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kamyaabi - Premium Dry Fruits" />
    <meta
      property="og:description"
      content="Premium, hand-picked dry fruits and nuts — sourced for purity, sealed for freshness, delivered across India."
    />
    <meta property="og:url" content="https://kamyaabi.in/" />
    <meta property="og:image" content="https://kamyaabi.in/pwa-512x512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kamyaabi - Premium Dry Fruits" />
    <meta
      name="twitter:description"
      content="Premium, hand-picked dry fruits and nuts — sourced for purity, sealed for freshness, delivered across India."
    />
    <meta name="twitter:image" content="https://kamyaabi.in/pwa-512x512.png" />

    <!-- Open a TCP+TLS connection to the image CDN as early as possible so
         the hero product image lands inside the LCP budget. -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!-- Google Fonts: preconnect + non-blocking stylesheet swap. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
