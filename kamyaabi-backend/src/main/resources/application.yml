server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024

spring:
  application:
    name: kamyaabi-backend

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# NOTE: appenders, rolling policy, and log format live in src/main/resources/logback-spring.xml
# so profile-aware rolling files and correlationId MDC rendering can be configured properly.
# Root/framework log levels are still tunable here and can be changed at runtime via the
# /actuator/loggers endpoint.
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
