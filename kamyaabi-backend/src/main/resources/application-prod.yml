spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://kamyaabi.in}

  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}

  email:
    enabled: ${EMAIL_ENABLED:true}
    from-email: ${EMAIL_FROM:noreply@kamyaabi.in}
    from-name: ${EMAIL_FROM_NAME:Kamyaabi}
    admin-emails:
      - ${ADMIN_EMAIL:admin@kamyaabi.in}
    sendgrid:
      api-key: ${SENDGRID_API_KEY}
    smtp:
      host: ${SMTP_HOST:}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
      starttls-enabled: true
      auth: true
