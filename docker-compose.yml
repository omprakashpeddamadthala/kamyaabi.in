# Local Development Docker Compose — builds from source
# SSL termination is handled by Nginx on the host VM (not in Docker).
# See DEPLOYMENT.md and nginx/vm/kamyaabi.conf for the VM-level Nginx setup.

services:
  backend:
    build:
      context: ./kamyaabi-backend
      dockerfile: Dockerfile
    container_name: kamyaabi-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-kamyaabi-docker-secret-key-must-be-at-least-256-bits-long-for-hs256}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://nextnotepad.com,http://localhost:3000,http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholder_secret}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@nextnotepad.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Kamyaabi}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@nextnotepad.com}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-your-sendgrid-api-key}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    networks:
      - kamyaabi-network

  frontend:
    build:
      context: ./kamyaabi-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: kamyaabi-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - kamyaabi-network

networks:
  kamyaabi-network:
    driver: bridge
