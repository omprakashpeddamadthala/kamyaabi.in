# /etc/nginx/sites-available/kamyaabi.conf
# VM-level Nginx reverse proxy with SSL termination for kamyaabi.shop
# Copy to: sudo cp nginx/vm/kamyaabi.conf /etc/nginx/sites-available/kamyaabi.conf
# Enable:  sudo ln -s /etc/nginx/sites-available/kamyaabi.conf /etc/nginx/sites-enabled/

# --- HTTP: redirect to HTTPS (except ACME challenge) ---
server {
    listen 80;
    listen [::]:80;
    server_name kamyaabi.shop www.kamyaabi.shop;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://kamyaabi.shop$request_uri;
    }
}

# --- HTTPS: main server block ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kamyaabi.shop www.kamyaabi.shop;

    # --- SSL certificates (managed by Certbot) ---
    ssl_certificate /etc/letsencrypt/live/kamyaabi.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kamyaabi.shop/privkey.pem;
    # SSL settings from Certbot (includes session, protocols, ciphers)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript image/svg+xml
               application/x-font-ttf font/opentype;

    # --- Request size limit (for image uploads, etc.) ---
    client_max_body_size 20M;

    # --- Rate limiting zones (defined in nginx.conf or here) ---
    # Uncomment and adjust if not defined globally:
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    # --- Backend API (Spring Boot on 127.0.0.1:8080) ---
    location /api/ {
        # limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # --- Swagger UI ---
    location /swagger-ui/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui.html {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- OpenAPI docs ---
    location /api-docs {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Actuator (health checks) ---
    location /actuator/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend (React SPA on 127.0.0.1:3000) ---
    location / {
        # limit_req zone=general burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
