version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kamyaabi-db
    environment:
      POSTGRES_DB: kamyaabi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./kamyaabi-backend
    container_name: kamyaabi-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/kamyaabi
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: kamyaabi-docker-secret-key-must-be-at-least-256-bits-long-for-hs256
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./kamyaabi-frontend
    container_name: kamyaabi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
