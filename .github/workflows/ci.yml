name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-test:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: kamyaabi-backend
        run: mvn clean verify -B

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: kamyaabi-backend/target/site/jacoco/

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: kamyaabi-frontend/package-lock.json

      - name: Install dependencies
        working-directory: kamyaabi-frontend
        run: npm ci

      - name: Build
        working-directory: kamyaabi-frontend
        run: npm run build

  docker-build:
    name: Docker - Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker image
        run: docker build -t kamyaabi-backend ./kamyaabi-backend

      - name: Build Frontend Docker image
        run: docker build -t kamyaabi-frontend ./kamyaabi-frontend
