server:
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 7200000  # 2 hours

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://kamyaabi.in,https://kamyaabi.shop}

  frontend-url: ${APP_FRONTEND_URL:https://kamyaabi.in}

  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}

  whatsapp-otp:
    api-url: ${CHATMITRA_API_URL:https://api.chatmitra.com/v2/client}
    api-token: ${CHATMITRA_API_TOKEN:}
    template-name: ${CHATMITRA_WHATSAPP_OTP_TEMPLATE_NAME:otp_login}
    language: ${CHATMITRA_WHATSAPP_OTP_LANGUAGE:en}

  support:
    email: ${APP_SUPPORT_EMAIL:support@kamyaabi.in}
    url: ${APP_SUPPORT_URL:https://kamyaabi.in}

  invoice:
    storage-directory: ${INVOICE_STORAGE_DIRECTORY:/app/invoices}
    company-name: ${INVOICE_COMPANY_NAME:Kamyaabi}
    company-address: ${INVOICE_COMPANY_ADDRESS:Premium Dry Fruits, India}
    company-email: ${INVOICE_COMPANY_EMAIL:${APP_SUPPORT_EMAIL:support@kamyaabi.in}}
    company-phone: ${INVOICE_COMPANY_PHONE:+91 9848999072}
    company-website: ${INVOICE_COMPANY_WEBSITE:${APP_SUPPORT_URL:https://kamyaabi.in}}
    logo-url: ${INVOICE_LOGO_URL:}
    currency: ${INVOICE_CURRENCY:INR}
    tax-label: ${INVOICE_TAX_LABEL:GST}
    tax-rate: ${INVOICE_TAX_RATE:0%}
    refund-policy-note: ${INVOICE_REFUND_POLICY_NOTE:Returns and refunds are handled as per Kamyaabi refund policy.}

  email:
    enabled: ${EMAIL_ENABLED:true}
    from-email: ${EMAIL_FROM:noreply@kamyaabi.in}
    from-name: ${EMAIL_FROM_NAME:Kamyaabi}
    # Admin notification recipients are now resolved dynamically from the
    # users table (any active user with role=ADMIN). The legacy admin-emails
    # config and ADMIN_EMAIL env var are no longer read.
    # Comma-separated DEVELOPER_EMAILS env var → developer-emails list.
    developer-emails: ${DEVELOPER_EMAILS:}
    sendgrid:
      api-key: ${SENDGRID_API_KEY}
    smtp:
      host: ${SMTP_HOST:}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
      starttls-enabled: true
      auth: true

  shiprocket:
    api-token: ${SHIPROCKET_API_TOKEN:}
    email: ${SHIPROCKET_EMAIL:}
    password: ${SHIPROCKET_PASSWORD:}
    token-refresh-interval-seconds: ${SHIPROCKET_TOKEN_REFRESH_INTERVAL_SECONDS:777600}
    pickup-location: ${SHIPROCKET_PICKUP_LOCATION:home}
    channel-id: ${SHIPROCKET_CHANNEL_ID:}
    webhook-secret: ${SHIPROCKET_WEBHOOK_SECRET:}
    pickup-pincode: ${SHIPROCKET_PICKUP_PINCODE:500081}
    default-weight: ${SHIPROCKET_DEFAULT_WEIGHT:0.5}
    default-length: ${SHIPROCKET_DEFAULT_LENGTH:10}
    default-breadth: ${SHIPROCKET_DEFAULT_BREADTH:10}
    default-height: ${SHIPROCKET_DEFAULT_HEIGHT:10}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

product:
  image:
    max-count: ${PRODUCT_IMAGE_MAX_COUNT:100}
